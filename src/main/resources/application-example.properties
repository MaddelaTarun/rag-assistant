spring.datasource.url=jdbc:mysql://localhost:3306/ragassistant_db
spring.datasource.username=raguser
spring.datasource.password=password

spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=8080
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
spring.ai.openai.base-url=https://openrouter.ai/api/v1
spring.ai.openai.api-key=API_KEY

spring.ai.openai.chat.model=qwen/qwen3-8b
spring.ai.openai.embedding.model=qwen/qwen3-embedding-8b
spring.ai.vectorstore.chroma.client.host=http://localhost
spring.ai.vectorstore.chroma.client.port=8000
spring.ai.vectorstore.chroma.collection-name=documents
spring.ai.vectorstore.chroma.initialize-schema=true

